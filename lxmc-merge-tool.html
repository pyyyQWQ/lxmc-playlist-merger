<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LXMC 歌单合并工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --card: #161b22;
    --card2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --red: #f87171;
    --orange: #fb923c;
    --blue: #38bdf8;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .header p {
    color: var(--text2);
    font-size: 13px;
  }

  /* Drop Zones */
  .drop-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    margin-bottom: 20px;
  }

  .drop-zone {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .drop-zone.dragover {
    border-color: var(--accent);
    background: #1e1f3a;
  }
  .drop-zone.filled {
    border-color: var(--green);
    border-style: solid;
    background: #0f1f15;
  }
  .drop-zone .zone-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 4px;
  }
  .drop-zone.filled .zone-title { color: var(--green); }
  .drop-zone .zone-hint {
    font-size: 12px;
    color: var(--text2);
  }
  .drop-zone .file-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    word-break: break-all;
    margin-top: 4px;
  }
  .drop-zone .song-count {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }

  .swap-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }
  .swap-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  input[type="file"] { display: none; }

  /* Stats Bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }
  .stat-card .stat-num {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat-card .stat-label {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }
  .stat-common .stat-num { color: var(--green); }
  .stat-only1 .stat-num { color: var(--orange); }
  .stat-only2 .stat-num { color: var(--blue); }
  .stat-total .stat-num { color: var(--accent2); }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .btn {
    padding: 9px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    flex: 1;
  }
  .btn-primary:disabled {
    background: #2a2d3e;
    color: var(--text2);
    cursor: not-allowed;
    opacity: 1;
    transform: none;
  }
  .btn-secondary {
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-download {
    background: var(--green);
    color: #fff;
    display: none;
  }
  .btn-download.show { display: inline-flex; align-items: center; gap: 6px; }

  /* Table */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: none;
  }
  .table-wrap.show { display: block; }

  .table-head {
    display: grid;
    grid-template-columns: 50px 1fr 1fr 90px;
    gap: 0;
    padding: 10px 16px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
  }

  .song-row {
    display: grid;
    grid-template-columns: 50px 1fr 1fr 90px;
    gap: 0;
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    align-items: center;
    transition: background 0.1s;
  }
  .song-row:last-child { border-bottom: none; }
  .song-row:hover { background: #1c2128; }

  .song-row .col-num {
    color: var(--text2);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .song-row .col-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 8px;
  }
  .song-row .col-singer {
    color: var(--text2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 8px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-common { background: #14532d; color: var(--green); }
  .tag-only1 { background: #7c2d12; color: var(--orange); }
  .tag-only2 { background: #0c4a6e; color: var(--blue); }

  .table-footer {
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text2);
    text-align: center;
    background: var(--card2);
    cursor: pointer;
    transition: background 0.15s;
  }
  .table-footer:hover { background: #252a33; color: var(--text); }

  /* Hint */
  .hint {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
    font-size: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  /* Error */
  .error-msg {
    background: #2f1515;
    border: 1px solid #7f1d1d;
    color: var(--red);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🎵 LXMC 歌单合并工具</h1>
    <p>拖入两个 .lxmc 歌单文件，自动对比差异并合并</p>
  </div>

  <!-- Error message -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Drop Zones -->
  <div class="drop-row">
    <div class="drop-zone" id="drop1" onclick="document.getElementById('file1').click()">
      <div class="zone-title">📁 文件 1</div>
      <div class="zone-hint">拖入文件或点击选择</div>
      <div class="file-name" id="name1"></div>
      <div class="song-count" id="count1"></div>
    </div>
    <input type="file" id="file1" accept=".lxmc" onchange="handleFileSelect(1, this.files[0])">

    <button class="swap-btn" onclick="swapFiles()" title="交换文件位置">⇄</button>

    <div class="drop-zone" id="drop2" onclick="document.getElementById('file2').click()">
      <div class="zone-title">📁 文件 2</div>
      <div class="zone-hint">拖入文件或点击选择</div>
      <div class="file-name" id="name2"></div>
      <div class="song-count" id="count2"></div>
    </div>
    <input type="file" id="file2" accept=".lxmc" onchange="handleFileSelect(2, this.files[0])">
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-card stat-common">
      <div class="stat-num" id="statCommon">0</div>
      <div class="stat-label">共有歌曲</div>
    </div>
    <div class="stat-card stat-only1">
      <div class="stat-num" id="statOnly1">0</div>
      <div class="stat-label">仅文件1新增</div>
    </div>
    <div class="stat-card stat-only2">
      <div class="stat-num" id="statOnly2">0</div>
      <div class="stat-label">仅文件2保留</div>
    </div>
    <div class="stat-card stat-total">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">合并后总计</div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" id="btnMerge" onclick="doMerge()" disabled>🔍 对比并合并</button>
    <button class="btn btn-secondary" id="btnReset" onclick="resetAll()" style="display:none">🗑️ 清空</button>
    <button class="btn btn-download" id="btnDownload" onclick="downloadMerged()">⬇️ 下载合并歌单</button>
  </div>

  <!-- Hint -->
  <div class="hint" id="hint">
    拖入两个 <strong>.lxmc</strong> 文件开始合并
  </div>

  <!-- Song Table -->
  <div class="table-wrap" id="tableWrap">
    <div class="table-head">
      <span>#</span>
      <span>歌曲名</span>
      <span>歌手</span>
      <span>状态</span>
    </div>
    <div id="tableBody"></div>
    <div class="table-footer" id="tableFooter" onclick="toggleAllRows()">展开全部 ▼</div>
  </div>

</div>

<!-- pako for gzip -->
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<script>
// ─── State ───────────────────────────────────────────────────────────
let file1Data = null, file2Data = null;
let file1Name = '', file2Name = '';
let file1List = [], file2List = [];
let mergeResult = null;
let showingAll = false;
const PAGE_SIZE = 100;

// ─── File Loading ───────────────────────────────────────────────────
function handleFile(n, file) {
  if (!file) return;
  if (!file.name.endsWith('.lxmc')) {
    showError('请选择 .lxmc 文件');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const buf = new Uint8Array(e.target.result);
      let json;
      try {
        json = JSON.parse(new TextDecoder().apply(null, [buf]).slice(0,200));
      } catch {}
      // Try direct JSON first, then gzip
      let parsed;
      try {
        parsed = JSON.parse(pako.inflate(buf, { to: 'string' }));
      } catch {
        try {
          parsed = JSON.parse(new TextDecoder().decode(buf));
        } catch {
          try {
            parsed = JSON.parse(pako.ungzip(buf, { to: 'string' }));
          } catch(e2) {
            showError('文件解析失败：' + e2.message);
            return;
          }
        }
      }
      if (!parsed || !parsed.data || !parsed.data.list) {
        showError('无效的 LXMC 文件格式');
        return;
      }
      if (n === 1) {
        file1Data = parsed;
        file1Name = file.name;
        file1List = parsed.data.list;
        setDropZone(1, file.name, file1List.length);
      } else {
        file2Data = parsed;
        file2Name = file.name;
        file2List = parsed.data.list;
        setDropZone(2, file.name, file2List.length);
      }
      hideError();
      updateUI();
    } catch(e) {
      showError('读取文件出错：' + e.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function handleFileSelect(n, file) { if (file) handleFile(n, file); }

// ─── Drag & Drop ────────────────────────────────────────────────────
const drop1 = document.getElementById('drop1');
const drop2 = document.getElementById('drop2');

[drop1, drop2].forEach((el, i) => {
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', e => { el.classList.remove('dragover'); });
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(i+1, file);
  });
});

// ─── Swap ───────────────────────────────────────────────────────────
function swapFiles() {
  if (!file1Data && !file2Data) return;
  const t1 = file1Data; const n1 = file1Name; const l1 = file1List;
  const t2 = file2Data; const n2 = file2Name; const l2 = file2List;
  file1Data = t2; file1Name = n2; file1List = l2;
  file2Data = t1; file2Name = n1; file2List = l1;
  if (file1Data) setDropZone(1, file1Name, file1List.length);
  else clearDropZone(1);
  if (file2Data) setDropZone(2, file2Name, file2List.length);
  else clearDropZone(2);
  updateUI();
}

// ─── Drop Zone Helpers ──────────────────────────────────────────────
function setDropZone(n, name, count) {
  const zone = document.getElementById('drop'+n);
  const title = zone.querySelector('.zone-title');
  const hint = zone.querySelector('.zone-hint');
  document.getElementById('name'+n).textContent = name;
  document.getElementById('count'+n).textContent = count + ' 首歌曲';
  zone.classList.add('filled');
  title.textContent = '✅ 已加载';
  hint.textContent = '点击可更换';
}

function clearDropZone(n) {
  const zone = document.getElementById('drop'+n);
  zone.classList.remove('filled');
  zone.querySelector('.zone-title').textContent = '📁 文件 '+n;
  zone.querySelector('.zone-hint').textContent = '拖入文件或点击选择';
  document.getElementById('name'+n).textContent = '';
  document.getElementById('count'+n).textContent = '';
}

// ─── UI Update ──────────────────────────────────────────────────────
function updateUI() {
  const hasBoth = file1Data && file2Data;
  document.getElementById('btnMerge').disabled = !hasBoth;
  document.getElementById('btnReset').style.display = hasBoth ? 'inline-block' : 'none';
  document.getElementById('hint').style.display = hasBoth ? 'none' : 'block';

  // Restore hint text if nothing loaded
  if (!file1Data && !file2Data) {
    document.getElementById('hint').textContent = '拖入两个 .lxmc 文件开始合并';
  }

  if (mergeResult) {
    document.getElementById('statsBar').style.display = 'grid';
    document.getElementById('btnDownload').classList.add('show');
    renderTable(mergeResult.rows, false);
    document.getElementById('tableWrap').classList.add('show');
  }
}

// ─── Merge Logic ────────────────────────────────────────────────────
function doMerge() {
  hideError();
  if (!file1Data || !file2Data) return;

  // Build source_id sets
  const keys1 = new Set();
  file1List.forEach(s => keys1.add(s.source+'_'+s.id));
  const keys2 = new Set();
  file2List.forEach(s => keys2.add(s.source+'_'+s.id));

  // Classify
  const common = [];        // in both (file2 order)
  const only1 = [];         // only in file1
  const only2 = [];         // only in file2

  // file2 order → common + only2
  file2List.forEach(s => {
    const k = s.source+'_'+s.id;
    if (keys1.has(k)) common.push(s);
    else only2.push(s);
  });

  // file1 order → only1
  file1List.forEach(s => {
    const k = s.source+'_'+s.id;
    if (!keys2.has(k)) only1.push(s);
  });

  const mergedList = [...common, ...only1, ...only2];

  // Build merged object (full copy of file2 as base structure)
  const merged = JSON.parse(JSON.stringify(file2Data));
  merged.data.list = mergedList;
  merged.data.locationUpdateTime = Date.now();

  mergeResult = {
    common: common.length,
    only1: only1.length,
    only2: only2.length,
    total: mergedList.length,
    merged: merged
  };

  // Update stats
  document.getElementById('statCommon').textContent = common.length;
  document.getElementById('statOnly1').textContent = only1.length;
  document.getElementById('statOnly2').textContent = only2.length;
  document.getElementById('statTotal').textContent = mergedList.length;

  showingAll = false;
  updateUI();
}

// ─── Table Rendering ────────────────────────────────────────────────
function buildRows(common, only1, only2) {
  const rows = [];
  common.forEach((s, i) => rows.push({ n: i+1, song: s, status: 'common' }));
  only1.forEach((s, i) => rows.push({ n: common.length+i+1, song: s, status: 'only1' }));
  only2.forEach((s, i) => rows.push({ n: common.length+only1.length+i+1, song: s, status: 'only2' }));
  return rows;
}

function renderTable(rows, showAll) {
  const body = document.getElementById('tableBody');
  const footer = document.getElementById('tableFooter');
  const displayRows = showAll ? rows : rows.slice(0, PAGE_SIZE);
  body.innerHTML = displayRows.map(r => `
    <div class="song-row">
      <span class="col-num">${r.n}</span>
      <span class="col-name" title="${escHtml(r.song.name)}">${escHtml(r.song.name)}</span>
      <span class="col-singer" title="${escHtml(r.song.singer)}">${escHtml(r.song.singer)}</span>
      <span>${r.status === 'common' ? '<span class="tag tag-common">共有</span>' : r.status === 'only1' ? '<span class="tag tag-only1">+文件1</span>' : '<span class="tag tag-only2">+文件2</span>'}</span>
    </div>
  `).join('');
  footer.textContent = showAll ? '收起 ▲' : `展开全部 ${rows.length} 首 ▼`;
}

function toggleAllRows() {
  if (!mergeResult) return;
  const keys1 = new Set(file1List.map(s=>s.source+'_'+s.id));
  const keys2 = new Set(file2List.map(s=>s.source+'_'+s.id));
  const common = file2List.filter(s => keys1.has(s.source+'_'+s.id));
  const only1 = file1List.filter(s => !keys2.has(s.source+'_'+s.id));
  const only2 = file2List.filter(s => !keys1.has(s.source+'_'+s.id));
  showingAll = !showingAll;
  renderTable(buildRows(common, only1, only2), showingAll);
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Download ───────────────────────────────────────────────────────
function downloadMerged() {
  if (!mergeResult) return;
  const json = JSON.stringify(mergeResult.merged);
  const compressed = pako.gzip(json);
  const blob = new Blob([compressed], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'merged_playlist.lxmc';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── Reset ──────────────────────────────────────────────────────────
function resetAll() {
  file1Data = file2Data = null;
  file1Name = file2Name = '';
  file1List = file2List = [];
  mergeResult = null;
  showingAll = false;
  clearDropZone(1);
  clearDropZone(2);
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('btnDownload').classList.remove('show');
  document.getElementById('tableWrap').classList.remove('show');
  document.getElementById('tableBody').innerHTML = '';
  document.getElementById('hint').style.display = 'block';
  document.getElementById('hint').textContent = '拖入两个 .lxmc 文件开始合并';
  hideError();
}

// ─── Error ──────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}
</script>
</body>
</html>
